name: Check Shopify Shelf

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Force notification even if nothing changed'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Download previous report
        uses: dawidd6/action-download-artifact@v20
        with:
          name: report-products
          path: tmp
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Download config
        uses: dawidd6/action-download-artifact@v20
        with:
          name: config
          path: .
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Write config from secret if not restored
        run: |
          if [ ! -f config.yml ]; then
            echo "$SHELF_MONITOR_CONFIG" > config.yml
          fi
        env:
          SHELF_MONITOR_CONFIG: ${{ secrets.SHELF_MONITOR_CONFIG }}

      - name: Run shelf check
        run: bundle exec ruby check.rb
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}
          FORCE_NOTIFY: ${{ inputs.force_notify }}
          CHECK_TYPE: products

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-products
          path: tmp/report-products.json
          retention-days: 7

      - name: Disable workflow after 3 consecutive failures
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          recent=$(gh run list --workflow=check.yml --limit=3 --json conclusion --jq '[.[].conclusion]')
          if [ "$recent" = '["failure","failure","failure"]' ]; then
            echo "3 consecutive failures — disabling workflow"
            gh workflow disable check.yml
          fi

name: Poll Telegram Commands

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Download previous command state
        uses: dawidd6/action-download-artifact@v20
        with:
          name: command-state
          path: tmp/previous
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Download config
        uses: dawidd6/action-download-artifact@v20
        with:
          name: config
          path: .
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Write config from secret if not restored
        run: |
          if [ ! -f config.yml ]; then
            echo "$SHELF_MONITOR_CONFIG" > config.yml
          fi
        env:
          SHELF_MONITOR_CONFIG: ${{ secrets.SHELF_MONITOR_CONFIG }}

      - name: Poll commands
        run: bundle exec ruby poll_commands.rb
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}

      - name: Upload command state
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: command-state
          path: tmp/command_state.json
          retention-days: 7

      - name: Upload config
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: config
          path: config.yml
          retention-days: 90

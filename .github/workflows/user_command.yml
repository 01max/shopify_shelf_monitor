name: Telegram User Command

on:
  repository_dispatch:
    types: [user-command]

jobs:
  handle:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Download config
        uses: dawidd6/action-download-artifact@v21
        with:
          name: config
          path: .
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Write config from secret if not restored
        run: |
          if [ ! -f config.yml ]; then
            echo "$SHELF_MONITOR_CONFIG" > config.yml
          fi
        env:
          SHELF_MONITOR_CONFIG: ${{ secrets.SHELF_MONITOR_CONFIG }}

      - uses: 01max/telegram-gh-action-dispatcher@v4
        with:
          command: ${{ github.event.client_payload.command }}
          chat_id: ${{ github.event.client_payload.chat_id }}
          args: ${{ github.event.client_payload.args }}
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload config
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: config
          path: config.yml
          retention-days: 90

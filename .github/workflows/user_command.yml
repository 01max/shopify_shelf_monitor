name: Telegram User Command

on:
  repository_dispatch:
    types: [user-command]

jobs:
  handle:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Write config
        run: echo "$SHELF_MONITOR_CONFIG" > config.yml
        env:
          SHELF_MONITOR_CONFIG: ${{ secrets.SHELF_MONITOR_CONFIG }}

      - uses: 01max/telegram-gh-action-dispatcher@v4
        with:
          command: ${{ github.event.client_payload.command }}
          chat_id: ${{ github.event.client_payload.chat_id }}
          args: ${{ github.event.client_payload.args }}
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Persist config to secret
        if: always()
        run: |
          if [ -s config.yml ]; then
            gh secret set SHELF_MONITOR_CONFIG --body "$(cat config.yml)" --repo ${{ github.repository }}
          fi
        env:
          GH_TOKEN: ${{ secrets.CONFIG_SYNC_TOKEN }}
